<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E7A5F">
<title>QuesMe</title>
<link rel="manifest" href="manifest.webmanifest">
<script>
  // 루트로 들어온 손님을 둘러보기(home) 또는 매장 화면(customer)으로 보냄
  (function(){
    var p = new URLSearchParams(location.search);
    var store = p.get('store');
    location.replace(store ? 'customer.html?store='+encodeURIComponent(store) : 'home.html');
  })();
</script>
</head>
<body>
<noscript><a href="home.html">QuesMe 둘러보기로 이동</a></noscript>
</body>
</html>
